<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReaproveitaAí — Produtos</title>

  <!-- Google Fonts: Syne (títulos) + DM Sans (texto geral) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />

  <!-- Nosso arquivo de estilos (pasta css/) -->
  <link rel="stylesheet" href="css/produtos.css" />
</head>
<body>

  <!-- ============================================================
       CABEÇALHO (HEADER)
       Fica fixo no topo da tela enquanto o usuário rola a página.
       ============================================================ -->
  <header class="cabecalho">

    <!-- Logo do aplicativo -->
    <div class="logo">
      <div class="logo-icone">🌿</div>
      ReaproveitaAí
    </div>

    <!-- Avatar do usuário logado (apenas visual por enquanto) -->
    <div class="avatar" title="Meu perfil">PZ</div>

  </header>


  <!-- ============================================================
       HERO (BANNER PRINCIPAL)
       Seção de destaque com título, subtítulo e campo de busca.
       ============================================================ -->
  <section class="hero">
    <div class="hero-etiqueta">Ofertas perto de você</div>
    <h1 class="hero-titulo">Encontre alimentos<br>com desconto 🛒</h1>
    <p class="hero-subtitulo">Reduza o desperdício e ajude o planeta</p>
  </section>


  <!-- ============================================================
       CONTEÚDO PRINCIPAL (FEED DE PRODUTOS)
       RF 2.1 — Listagem de Produtos
       ============================================================ -->
  <main class="conteudo">

    <!-- Cabeçalho da seção: título dinâmico + link -->
    <div class="secao-cabecalho">
      <span class="secao-titulo" id="tituloSecao">Ofertas disponíveis</span>
      <a class="secao-link">Ver todas →</a>
    </div>

    <!-- Grade de cards — preenchida pelo JavaScript -->
    <div class="grade-cards" id="feed"></div>

    <!-- Mensagem exibida quando nenhum produto é encontrado -->
    <div class="estado-vazio" id="estadoVazio">
      <span>🔎</span>
      <p>Nenhum resultado encontrado.</p>
    </div>

    <!-- Espaço extra para não sobrepor o menu de navegação -->
    <div class="espacador"></div>

  </main>


  <!-- ============================================================
       TOAST (NOTIFICAÇÃO FLUTUANTE)
       Aparece brevemente ao reservar um produto.
       ============================================================ -->
  <div class="toast" id="toast"></div>


  <!-- ============================================================
       NAVEGAÇÃO INFERIOR (BOTTOM NAV)
       Menu fixo na parte de baixo da tela.
       ============================================================ -->
  <nav class="nav-inferior">
    <div class="nav-item ativo">
      <span class="nav-icone">🏠</span> Feed
    </div>
    <div class="nav-item">
      <span class="nav-icone">📦</span> Reservas
    </div>
    <div class="nav-item">
      <span class="nav-icone">👤</span> Perfil
    </div>
  </nav>


  <!-- Nosso arquivo de scripts (pasta js/) -->
  <!-- Fica no FINAL do body para garantir que o HTML já foi carregado -->
  <script src="js/produtos.js"></script>

</body>
</html>
