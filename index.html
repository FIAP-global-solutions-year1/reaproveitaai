<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <!-- Configura o padrão de caracteres e permite acentos corretamente -->
    <meta charset="UTF-8">

    <!-- Faz a página se adaptar ao tamanho da tela -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título que aparece na aba do navegador -->
    <title>Contato</title>

    <!-- Importa fontes externas para deixar o visual mais parecido com a referência -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Roboto+Mono:wght@600&display=swap"
        rel="stylesheet">

    <style>
        /* Remove espaçamentos padrão do navegador */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Define cores principais usadas no site */
        :root {
            --verde-escuro: #2f3d2a;
            --verde-medio: #78915e;
            --verde-claro: #eef6e3;
            --verde-borda: #d7e6c4;
            --texto-suave: #8fa27d;
        }

        /* Define o fundo geral da página */
        body {
            min-height: 100vh;
            font-family: "Poppins", sans-serif;
            color: var(--verde-escuro);
            background:
                radial-gradient(circle at 15% 25%, rgba(255, 255, 255, 0.9) 0 2px, transparent 3px),
                radial-gradient(circle at 30% 55%, rgba(255, 255, 255, 0.8) 0 2px, transparent 3px),
                radial-gradient(circle at 68% 42%, rgba(255, 255, 255, 0.8) 0 2px, transparent 3px),
                radial-gradient(circle at 80% 62%, rgba(255, 255, 255, 0.9) 0 2px, transparent 3px),
                linear-gradient(180deg, #fbfdf7 0%, var(--verde-claro) 100%);
            overflow-x: hidden;
        }

        /* Cria os pontinhos verdes no topo da tela */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 110px;
            background-image: radial-gradient(circle, #819765 1.5px, transparent 1.8px);
            background-size: 18px 18px;
            opacity: 0.45;
            pointer-events: none;
            mask-image: linear-gradient(to bottom, black, transparent);
        }

        /* Área principal que centraliza o conteúdo na tela */
        .pagina-contato {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px 24px;
        }

        /* Bloco central do formulário */
        .card-contato {
            width: 100%;
            max-width: 560px;
            transform: translateY(-25px);
        }

        /* Texto pequeno acima do título */
        .etiqueta {
            display: inline-block;
            margin-bottom: 10px;
            font-family: "Roboto Mono", monospace;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 8px;
            color: var(--verde-medio);
        }

        /* Título principal */
        h1 {
            margin-bottom: 14px;
            font-size: 52px;
            line-height: 1.05;
            font-weight: 700;
            letter-spacing: -1.8px;
            color: var(--verde-escuro);
        }

        /* Texto abaixo do título */
        .descricao {
            margin-bottom: 40px;
            font-size: 15px;
            color: var(--texto-suave);
        }

        /* Organiza os campos do formulário em coluna */
        .formulario-contato {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* Estilo dos campos de nome, email e mensagem */
        input,
        textarea {
            width: 100%;
            border: 1px solid var(--verde-borda);
            border-radius: 14px;
            background: rgba(250, 253, 246, 0.6);
            color: var(--verde-escuro);
            font-family: "Roboto Mono", monospace;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            box-shadow: 0 10px 25px rgba(120, 145, 94, 0.05);
        }

        /* Tamanho dos campos menores */
        input {
            height: 54px;
            padding: 0 22px;
        }

        /* Tamanho do campo de mensagem */
        textarea {
            height: 135px;
            padding: 20px 22px;
            resize: none;
        }

        /* Cor do texto interno dos campos */
        input::placeholder,
        textarea::placeholder {
            color: rgba(120, 145, 94, 0.55);
        }

        /* Efeito quando o campo é selecionado */
        input:focus,
        textarea:focus {
            border-color: rgba(120, 145, 94, 0.7);
            background: rgba(255, 255, 255, 0.75);
            box-shadow: 0 0 0 4px rgba(120, 145, 94, 0.12);
        }

        /* Estilo do botão de envio */
        button {
            height: 56px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(180deg, #809761 0%, #708855 100%);
            color: white;
            font-family: "Poppins", sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 16px 35px rgba(77, 98, 58, 0.18);
        }

        /* Controla o tamanho do ícone do botão */
        button svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Efeito ao passar o mouse no botão */
        button:hover {
            filter: brightness(1.05);
            transform: translateY(-2px);
        }

        /* Adaptação para telas menores */
        @media (max-width: 640px) {
            .pagina-contato {
                align-items: flex-start;
                padding-top: 90px;
            }

            .card-contato {
                transform: none;
            }

            h1 {
                font-size: 38px;
            }

            .etiqueta {
                letter-spacing: 5px;
            }
        }
    </style>
</head>

<body>

    <!-- Área principal da tela de contato -->
    <main class="pagina-contato">

        <!-- Caixa central que agrupa título, texto e formulário -->
        <section class="card-contato">

            <!-- Pequena etiqueta superior -->
            <span class="etiqueta">CONTATO</span>

            <!-- Título principal -->
            <h1>Fale conosco.</h1>

            <!-- Texto de apoio -->
            <p class="descricao">
                Tire suas duvidas aqui!!!
            </p>

            <!-- Formulário visual, sem funcionamento real -->
            <form id="formContato" class="formulario-contato">

                <!-- Campo para nome -->
                <input type="text" id="nome" placeholder="Nome" required>

                <!-- Campo para email -->
                <input type="email" id="email" placeholder="Email" required>

                <!-- Campo para assunto -->
                <select id="assunto" required>
                    <option value="" disabled selected>Escolha o assunto...</option>
                    <option value="Dúvida">Dúvida</option>
                    <option value="Relatar Problema de Reserva">Relatar Problema de Reserva</option>
                    <option value="Suporte Técnico">Suporte Técnico</option>
                </select>

                <!-- Campo para mensagem -->
                <textarea id="mensagem" placeholder="Mensagem" required minlength="20"></textarea>

                <!-- Botão de envio apenas visual -->
                <button type="submit" id="btnEnviar">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path
                            d="M21.7 3.3c.2.2.3.5.2.8l-6.5 16.5c-.1.3-.4.5-.8.5s-.6-.2-.8-.5l-3.1-6.2-6.2-3.1c-.3-.2-.5-.5-.5-.8s.2-.6.5-.8L21 3.1c.3-.1.5 0 .7.2ZM6.8 10.5l4.8 2.4 2.4 4.8 5.2-13.1L6.8 10.5Z" />
                    </svg>
                    Enviar mensagem
                </button>

            </form>

        </section>

    </main>

</body>

</html>
